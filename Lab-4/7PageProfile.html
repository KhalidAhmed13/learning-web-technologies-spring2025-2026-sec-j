<!DOCTYPE html>
<html lang="en">
<head>
  <title>Profile Picture</title>
  <script>
    function validateProfileForm() 
    {
      const userIdInput = document.getElementById("userid");
      const photoInput = document.getElementById("photo");

      const userid = userIdInput.value.trim();

      //UserId cannot be empty and has to be a positive number
      if (userid.length === 0) {
        alert("User ID cannot be empty.");
        userIdInput.focus();
        return false;
      }
      if (!/^\d+$/.test(userid) || parseInt(userid, 10) <= 0) 
      {
        alert("User ID must be a positive number.");
        userIdInput.focus();
        return false;
      }

      // ii. Picture cannot be empty
      if (photoInput.value.trim().length === 0) 
      {
        alert("Please choose a profile picture.");
        photoInput.focus();
        return false;
      }

      return true;
    }
  </script>
</head>
<body>

  <h3>7. Profile Picture</h3>

  <form method="get" action="8PagePersonProfile.html" onsubmit="return validateProfileForm();">
    User ID<br />
    <input type="text" id="userid" name="userid" /><br /><br />

    Picture<br />
    <input type="file" id="photo" name="photo" /><br /><br />

    <input type="submit" value="Finish" />
  </form>

  <br />
  <a href="6PageBloodgroup.html">Back</a>

</body>
</html>
